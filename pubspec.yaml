name: al_walla_team
description: "فريق الولاء الطبي (Al-Walaa Medical Team) - Internal Management Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  path_provider: ^2.1.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Localization
  intl: ^0.20.2

  # Utilities
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  crypto: ^3.0.6

  # Fonts
  google_fonts: ^6.2.1
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
